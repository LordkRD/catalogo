<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your description here for SEO purposes">
    <meta name="keywords" content="your, keywords, here">
    <meta name="author" content="Your Name">
    <title>Your Title</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        // Debounced search function
        let timeout;
        function search(query) {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                // Perform search operation
            }, 300);
        }

        // Dark mode detection
        function detectDarkMode() {
            const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            if (darkModeMediaQuery.matches) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        }
        detectDarkMode();

        // Improved form validation
        function validateForm() {
            const form = document.getElementById('myForm');
            const inputs = form.querySelectorAll('input, textarea');
            let valid = true;
            inputs.forEach(input => {
                if (!input.checkValidity()) {
                    valid = false;
                    // Show error message
                    const errorMsg = document.createElement('div');
                    errorMsg.innerText = input.validationMessage;
                    errorMsg.classList.add('error');
                    input.parentNode.insertBefore(errorMsg, input);
                }
            });
            return valid;
        }

        // Back-to-top button
        function backToTop() {
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</head>
<body>
    <header>
        <nav>
            <button onclick="backToTop()">Back to Top</button>
        </nav>
    </header>
    <main>
        <h1>Welcome</h1>
        <form id="myForm" aria-label="Contact Form" onsubmit="return validateForm()">
            <input type="text" aria-label="Your Name" required>
            <input type="email" aria-label="Your Email" required>
            <button type="submit">Submit</button>
        </form>
        <div class="toast" role="alert">
            <span class="toast-icon">✔️</span> This is a toast notification!
        </div>
        <div class="loading-animation" aria-busy="true">Loading...</div>
    </main>
    <footer>
        <p>&copy; 2026 Your Company</p>
    </footer>
</body>
</html>
